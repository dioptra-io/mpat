definitions:
  api.CreateTaskRequest:
    properties:
      retina_stream:
        allOf:
        - $ref: '#/definitions/api.RetinaStreamTaskRequest'
        description: One of
    type: object
  api.CreateTaskResponse:
    properties:
      task_uuid:
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  api.RetinaStreamTaskRequest:
    properties:
      duration_seconds:
        example: 60
        type: integer
      endpoint:
        type: string
      output_file:
        type: string
    type: object
  api.Task:
    properties:
      retina_stream:
        allOf:
        - $ref: '#/definitions/api.RetinaStreamTaskRequest'
        description: One of
      status:
        $ref: '#/definitions/api.TaskStatus'
      uuid:
        type: string
    type: object
  api.TaskStatus:
    enum:
    - queued
    - running
    - done
    - failed
    - cancelled
    type: string
    x-enum-varnames:
    - TaskStatusQueued
    - TaskStatusRunning
    - TaskStatusDone
    - TaskStatusFailed
    - TaskStatusCancelled
info:
  contact: {}
paths:
  /healthz:
    get:
      description: Returns ok if the MPAT worker server is alive.
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /tasks:
    get:
      description: Returns all known tasks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a new task, stores it, and enqueues it for execution.
      parameters:
      - description: Task creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.CreateTaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create task
      tags:
      - tasks
  /tasks/{task_uuid}:
    get:
      description: Returns a task by UUID.
      parameters:
      - description: Task UUID
        in: path
        name: task_uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Task'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get task
      tags:
      - tasks
  /tasks/{task_uuid}/cancel:
    post:
      description: Cancels a running task by UUID.
      parameters:
      - description: Task UUID
        in: path
        name: task_uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CreateTaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Cancel task
      tags:
      - tasks
  /tasks/canceled:
    get:
      description: Returns tasks that were canceled.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List canceled tasks
      tags:
      - tasks
  /tasks/done:
    get:
      description: Returns tasks that completed successfully.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List completed tasks
      tags:
      - tasks
  /tasks/failed:
    get:
      description: Returns tasks that failed during execution.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List failed tasks
      tags:
      - tasks
  /tasks/queued:
    get:
      description: Returns tasks that are currently queued.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List queued tasks
      tags:
      - tasks
  /tasks/running:
    get:
      description: Returns tasks that are currently running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List running tasks
      tags:
      - tasks
  /tasks/terminated:
    get:
      description: Returns tasks that reached a terminal state (done, failed, or canceled).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List terminated tasks
      tags:
      - tasks
swagger: "2.0"
